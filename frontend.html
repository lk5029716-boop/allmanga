<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale-1">
<title>AllManga — Anime Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #141420;
  --surface2: #1c1c2e;
  --border: #2a2a40;
  --accent: #7c3aed;
  --accent-hover: #6d28d9;
  --green: #22c55e;
  --red: #ef4444;
  --text: #e2e2f0;
  --text-dim: #8888aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header .sub { font-size: 11px; color: var(--text-dim); }

/* ── Search Row ── */
.search-row {
  padding: 16px 20px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
input, select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--accent); }
input::placeholder { color: var(--text-dim); }
#q { width: 260px; }
#showId { width: 220px; }
#ep { width: 70px; }
select { cursor: pointer; }

button {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
button:hover { background: var(--accent-hover); }
button:active { transform: scale(0.97); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Layout ── */
.main { display: flex; gap: 0; max-width: 1400px; margin: 0 auto; padding: 0 20px 40px; }

/* ── Player Column ── */
.player-col { flex: 1; min-width: 0; }
.video-wrap {
  position: relative;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
  aspect-ratio: 16/9;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#player { width: 100%; height: 100%; display: object; object-fit: contain; background: #000; }

/* ── Status Bar ── */
.status-bar {
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 40px;
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-dim);
  flex-shrink: 0;
}
.status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
.status-dot.ok { background: var(--green); }
.status-dot.err { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Server Buttons ── */
.servers { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
.srv-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.srv-btn:hover { border-color: var(--accent); background: var(--surface); }
.srv-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.srv-btn .tag {
  font-size: 10px;
  padding: 2px 5px;
  border-radius: 4px;
  background: rgba(255,255,255,0.15);
  font-weight: 600;
}
.srv-btn.active .tag { background: rgba(0,0,0,0.25); }
.srv-btn.unavail { opacity: 0.4; cursor: not-allowed; }
.srv-btn.unavail:hover { border-color: var(--border); }

/* ── Sidebar ── */
.sidebar {
  width: 300px;
  flex-shrink: 0;
  margin-left: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Show Results ── */
.results-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.results-panel h3 {
  padding: 12px 14px;
  font-size: 13px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}
.result-item {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.result-item:hover { background: var(--surface2); }
.result-item:last-child { border-bottom: none; }
.result-item .name { font-weight: 500; }
.result-item .id { font-size: 11px; color: var(--text-dim); font-family: monospace; }

/* ── Episode List ── */
.ep-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.ep-panel h3 {
  padding: 12px 14px;
  font-size: 13px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}
.ep-list {
  max-height: 300px;
  overflow-y: auto;
}
.ep-item {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ep-item:hover { background: var(--surface2); }
.ep-item.active { background: rgba(124,58,237,0.15); border-left: 3px solid var(--accent); }
.ep-num { font-weight: 600; min-width: 28px; }
.ep-title { color: var(--text-dim); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Raw JSON toggle ── */
.raw-toggle {
  margin-top: 12px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  width: 100%;
  text-align: left;
}
.raw-toggle:hover { color: var(--text); border-color: var(--text-dim); }
#raw-json {
  display: none;
  margin-top: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-size: 11px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--text-dim);
  max-height: 300px;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-all;
}

/* ── Responsive ── */
@media (max-width: 900px) {
  .main { flex-direction: column; padding: 0 12px 40px; }
  .sidebar { width: 100%; margin-left: 0; margin-top: 16px; }
  #q { width: 100%; }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<div class="header">
  <h1>AllManga</h1>
  <div class="sub">Anime streaming • direct video URLs</div>
</div>

<div class="search-row">
  <input id="q" placeholder="Search anime…" value="iruma">
  <select id="mode"><option>sub</option><option>dub</option></select>
  <button onclick="doSearch()" id="searchBtn">Search</button>
  <span style="flex:1"></span>
  <input id="showId" placeholder="showId" value="6uHjY9KytQFCE4cvJ">
  <input id="ep" placeholder="ep" value="9" type="number" min="1">
  <button onclick="loadSources()" id="srcBtn">▶ Load</button>
</div>

<div class="main">
  <div class="player-col">
    <div class="video-wrap">
      <video id="player" controls playsinline></video>
    </div>
    <div class="status-bar" id="status">
      <div class="status-dot" id="sdot"></div>
      <span id="stext">Click "Load" to fetch sources</span>
    </div>
    <div class="servers" id="servers"></div>
    <button class="raw-toggle" onclick="toggleRaw()">{ } Raw API Response</button>
    <pre id="raw-json"></pre>
  </div>

  <div class="sidebar">
    <div class="results-panel" id="resultsPanel" style="display:none">
      <h3>Search Results</h3>
      <div id="results"></div>
    </div>
    <div class="ep-panel" id="epPanel" style="display:none">
      <h3>Episodes</h3>
      <div class="ep-list" id="epList"></div>
    </div>
  </div>
</div>

<script>
const $ = s => document.getElementById(s);
const video = $('player');
let currentHls = null;
let lastSources = null;

function setStatus(text, state='idle') {
  $('stext').textContent = text;
  $('sdot').className = 'status-dot ' + (state === 'loading' ? 'loading' : state === 'ok' ? 'ok' : state === 'err' ? 'err' : '');
}

async function doSearch() {
  const q = $('q').value.trim();
  if (!q) return;
  $('searchBtn').disabled = true;
  setStatus('Searching…', 'loading');
  try {
    const r = await fetch(`/search?q=${encodeURIComponent(q)}&mode=${$('mode').value}`).then(r => r.json());
    const edges = (r.shows && r.shows.edges) || [];
    if (!edges.length) {
      setStatus('No results found', 'err');
      $('resultsPanel').style.display = 'none';
    } else {
      $('resultsPanel').style.display = '';
      $('results').innerHTML = edges.map(s => `
        <div class="result-item" onclick="pickShow('${s._id}', '${s.name.replace(/'/g,'\\'')}')">
          <span class="name">${s.name}</span>
          <span class="id">${s._id}</span>
        </div>
      `).join('');
      setStatus(`Found ${edges.length} results`, 'ok');
    }
  } catch(e) {
    setStatus('Search failed: ' + e.message, 'err');
  }
  $('searchBtn').disabled = false;
}

function pickShow(id, name) {
  $('showId').value = id;
  loadEpisodes();
}

async function loadEpisodes() {
  const showId = $('showId').value.trim();
  if (!showId) return;
  try {
    const r = await fetch(`/episodes?showId=${encodeURIComponent(showId)}`).then(r => r.json());
    const episodes = r.episode || r.episodes || [];
    const list = Array.isArray(episodes) ? episodes : [];
    if (list.length) {
      $('epPanel').style.display = '';
      $('epList').innerHTML = list.map((e, i) => `
        <div class="ep-item" onclick="pickEp('${e.episodeString || (i+1)}')">
          <span class="ep-num">Ep ${e.episodeString || (i+1)}</span>
          <span class="ep-title">${e.title||''}</span>
        </div>
      `).join('');
    }
  } catch(e) { console.log('episodes error', e); }
}

function pickEp(num) {
  $('ep').value = num;
}

async function loadSources() {
  const showId = $('showId').value.trim();
  const ep = $('ep').value.trim();
  const mode = $('mode').value;
  if (!showId || !ep) return setStatus('Enter showId and ep number', 'err');

  $('srcBtn').disabled = true;
  setStatus('Fetching real video URLs…', 'loading');
  $('servers').innerHTML = '';
  $('raw-json').style.display = 'none';

  try {
    const url = `/sources?showId=${encodeURIComponent(showId)}&ep=${encodeURIComponent(ep)}&mode=${mode}`;
    const r = await fetch(url).then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    });
    lastSources = r;

    const servers = r.servers || [];
    const buttons = [];
    let hasLinks = false;

    for (const srv of servers) {
      if (srv.links && srv.links.length) {
        hasLinks = true;
        for (const l of srv.links) {
          const label = `${srv.server} · ${l.quality} · ${l.format}`;
          const data = encodeURIComponent(JSON.stringify(l));
          buttons.push(
            `<button class="srv-btn" id="srv-${srv.server}" onclick='play(${JSON.stringify(l)})'>
              <span>${srv.server}</span>
              <span class="tag">${l.format.toUpperCase()}</span>
              <span class="tag">${l.quality}</span>
            </button>`
          );
        }
      } else {
        const reason = srv.error ? 'error' : (srv.note || 'unresolved');
        buttons.push(
          `<button class="srv-btn unavail" disabled title="${reason}">
            <span>${srv.server}</span>
            <span class="tag">✗</span>
          </button>`
        );
      }
    }

    $('servers').innerHTML = buttons.join('');
    $('raw-json').textContent = JSON.stringify(r, null, 2);

    const direct = r.best;
    if (direct) {
      setStatus(`✅ ${servers.filter(s=>s.links&&s.links.length).length}/${servers.length} servers ready. Top: ${direct.url.substring(0,60)}…`, 'ok');
      // Auto-play best
      play(direct);
    } else {
      setStatus('No direct video URLs found', 'err');
    }
  } catch(e) {
    setStatus('Error: ' + e.message, 'err');
    console.error(e);
  }

  $('srcBtn').disabled = false;
}

function play(link) {
  const src = link.proxy || link.url;
  document.querySelectorAll('.srv-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`srv-${link.server}`);
  if (btn) btn.classList.add('active');

  setStatus(`▶ Playing: ${link.server} ${link.quality} ${link.format}`, 'ok');

  // Cleanup previous HLS
  if (currentHls) { currentHls.destroy(); currentHls = null; }

  if (link.format === 'hls' && window.Hls && Hls.isSupported()) {
    currentHls = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
    });
    currentHls.loadSource(src);
    currentHls.attachMedia(video);
    currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
    currentHls.on(Hls.Events.ERROR, (ev, data) => {
      if (data.fatal) {
        console.error('HLS error', data);
        setStatus('HLS playback error — try another server', 'err');
      }
    });
  } else {
    // Direct MP4 or native HLS (Safari)
    video.src = src;
    video.play().catch(e => {
      console.log('Autoplay blocked, user can click play');
      setStatus('Ready — press Play', 'ok');
    });
  }
}

function toggleRaw() {
  const el = $('raw-json');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// Enter key triggers search
$('q').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
</script>
</body>
</html>
